log_file: speech_log.txt
history:
  max_messages: 12
speech_recognition:
  # 音声認識エンジン: google(オンライン) / sphinx(完全ローカル)
  engine: google
  language: ja-JP

  #engine: sphinx
  #language: en-US # sphinx の標準同梱モデルは en-US。ja-JP を使う場合は別途モデル配置が必要。

  ambient_duration: 1.0
  listen_timeout: 8.0
  phrase_time_limit: 10.0
  exit_phrases:
    - stop
    - stop recording
    - exit
    - quit
    - 終了
    - 会話終了
    - ストップ
ai:
  api_url: http://127.0.0.1:1234/v1/chat/completions
  model_name: local-model
  temperature: 0.3
  timeout_seconds: 30
  system_prompt: あなたは簡潔に短く会話するアシスタントです。返答は1文で短くしてください。
  voicevox_character_prompts:
    3: あなたは「ずんだもん」です。一人称は「ぼく」。語尾に「のだ」「なのだ」を自然に使い、親しみやすく明るい口調で短く答えてください。
    8: あなたは「春日部つむぎ」です。一人称は「あーし」。高校生らしいフレンドリーで軽快な口調で、テンポよく短く答えてください。
tts:
  provider: voicevox
  # VOICEVOXを使う場合は provider を voicevox に変更する。
  #provider: voicevox
  fallback_providers:
    - powershell
    # - pyttsx3
  voicevox:
    base_url: http://127.0.0.1:50021
    # 話者切替テンプレート（どちらか1つを有効化）
    speaker: 3   # ずんだもん
    #speaker: 8 # 春日部つむぎ
    timeout_seconds: 15
    speed_scale: 1.0
    pitch_scale: 0.0
    intonation_scale: 1.0
    volume_scale: 1.0
    pre_phoneme_length: 0.1
    post_phoneme_length: 0.1
  pyttsx3:
    rate: null
    volume: null
    voice_name: null
  powershell:
    rate: 0
    volume: 100
